# rotate_keys.yaml — Service definitions and scan settings for rotate_keys.py
# Copy this file next to rotate_keys.py and edit as needed.

# ---------------------------------------------------------------------------
# Filesystem scan settings
# ---------------------------------------------------------------------------
search_dirs:
  - /mnt/user/appdata
  - /mnt/user/data
  - /mnt/tank
  - /mnt/Dozer
  - /boot/config

search_exts:
  - .yaml
  - .yml
  - .json
  - .conf
  - .config
  - .xml
  - .ini
  - .env
  - .toml
  - .cfg

skip_dirs:
  - logs
  - log
  - cache
  - Cache
  - Backups
  - backup
  - MediaCover
  - metadata
  - .git
  - Crash Reports
  - node_modules
  - __pycache__
  - venv
  - site-packages
  - dist
  - build
  - media
  - transcodes
  - thumbnails
  - previews
  - Metadata
  - Plug-in Support
  - databases
  - tv
  - movies
  - music
  - photos
  - downloads
  - .trash
  - .Recycle.Bin
  - lost+found
  - System Volume Information

# ---------------------------------------------------------------------------
# Remote hosts to also search/replace (SSH key auth required)
# ---------------------------------------------------------------------------
remote_hosts:
  - label: TrueNAS
    host: 192.168.1.122
    user: root
    search_dirs:
      - /mnt/Data/appdata
    db_refs:
      - ["/mnt/Data/appdata/prowlarr/prowlarr.db", "Applications", "Settings"]
      - ["/mnt/Data/appdata/prowlarr/prowlarr.db", "Indexers", "Settings"]

# ---------------------------------------------------------------------------
# Additional .env paths to mirror on every rotation
# (e.g. a second server's .env that shares the same keys)
# ---------------------------------------------------------------------------
env_mirrors: []

# ---------------------------------------------------------------------------
# Named DB reference groups (referenced by services below)
# ---------------------------------------------------------------------------
db_ref_groups:
  arr_indexer:
    - ["/mnt/user/appdata/sonarr/sonarr.db", "Indexers", "Settings"]
    - ["/mnt/user/appdata/radarr/radarr.db", "Indexers", "Settings"]
    - ["/mnt/user/appdata/lidarr/lidarr.db", "Indexers", "Settings"]
    - ["/mnt/user/appdata/readarr/readarr.db", "Indexers", "Settings"]
  arr_dlclient:
    - ["/mnt/user/appdata/sonarr/sonarr.db", "DownloadClients", "Settings"]
    - ["/mnt/user/appdata/radarr/radarr.db", "DownloadClients", "Settings"]
    - ["/mnt/user/appdata/lidarr/lidarr.db", "DownloadClients", "Settings"]
    - ["/mnt/user/appdata/readarr/readarr.db", "DownloadClients", "Settings"]
  prowlarr_apps:
    - ["/mnt/user/appdata/prowlarr/prowlarr.db", "Applications", "Settings"]
  bazarr:
    - ["/mnt/user/appdata/bazarr/db/bazarr.db", "system", "configured"]

# ---------------------------------------------------------------------------
# Service registry
# ---------------------------------------------------------------------------
# auto_fetch can be omitted, or set to:
#   type: arr_xml
#   path: /mnt/user/appdata/SONAME/config.xml
#
# db_refs can reference named groups above (e.g. "arr_indexer") or list
# raw tuples inline.
services:
  sonarr:
    display_name: Sonarr
    env_var: SONARR_API_KEY
    settings_url: http://192.168.1.104:8989/settings/general
    auto_fetch:
      type: arr_xml
      path: /mnt/user/appdata/sonarr/config.xml
    db_refs:
      - prowlarr_apps

  radarr:
    display_name: Radarr
    env_var: RADARR_API_KEY
    settings_url: http://192.168.1.104:7878/settings/general
    auto_fetch:
      type: arr_xml
      path: /mnt/user/appdata/radarr/config.xml
    db_refs:
      - prowlarr_apps

  lidarr:
    display_name: Lidarr
    env_var: LIDARR_API_KEY
    settings_url: http://192.168.1.104:8686/settings/general
    auto_fetch:
      type: arr_xml
      path: /mnt/user/appdata/lidarr/config.xml
    db_refs:
      - prowlarr_apps

  readarr:
    display_name: Readarr
    env_var: READARR_API_KEY
    settings_url: http://192.168.1.104:8787/settings/general
    auto_fetch:
      type: arr_xml
      path: /mnt/user/appdata/readarr/config.xml
    db_refs:
      - prowlarr_apps

  prowlarr:
    display_name: Prowlarr
    env_var: PROWLARR_API_KEY
    settings_url: http://192.168.1.122:9696/settings/general
    auto_fetch:
      type: arr_xml
      path: /mnt/user/appdata/prowlarr/config.xml
    db_refs:
      - arr_indexer
    note: After rotating, each *arr app needs its Prowlarr indexer updated — this script handles it automatically via the SQLite DB.

  overseerr:
    display_name: Overseerr
    env_var: OVERSEERR_API_KEY
    settings_url: http://192.168.1.104:5055/settings

  bazarr:
    display_name: Bazarr
    env_var: BAZARR_API_KEY
    settings_url: http://192.168.1.104:6767/settings/general

  jackett:
    display_name: Jackett
    env_var: JACKETT_API_KEY
    settings_url: http://192.168.1.122:9117/UI/Dashboard
    db_refs:
      - arr_indexer

  autobrr:
    display_name: Autobrr
    env_var: AUTOBRR_API_KEY
    settings_url: http://192.168.1.104:7474/settings/api

  slskd:
    display_name: Slskd
    env_var: SLSKD_API_KEY
    settings_url: http://192.168.1.104:5035/settings

  plex:
    display_name: Plex
    env_var: PLEX_TOKEN
    settings_url: https://app.plex.tv/desktop/#!/settings/account
    note: Plex tokens are personal account tokens. Low priority — skip unless you believe it was actually used maliciously.

  tautulli:
    display_name: Tautulli
    env_var: TAUTULLI_API_KEY
    settings_url: http://192.168.1.104:8189/settings

  sabnzbd:
    display_name: SABnzbd
    env_var: SABNZBD_API_KEY
    settings_url: http://192.168.1.122:10097/sabnzbd/config/general/
    db_refs:
      - arr_dlclient

  qbittorrent:
    display_name: qBittorrent password
    env_var: QBITTORRENT_PASSWORD
    settings_url: http://192.168.1.122:10095/
    db_refs:
      - arr_dlclient
    note: Change password in qBittorrent WebUI Options > Web UI > Password.

  npm:
    display_name: Nginx Proxy Manager  ← DO THIS FIRST (public VPS)
    env_var: NPM_PASSWORD
    settings_url: http://172.245.73.170:81
    note: This is internet-facing. Highest priority.

  pangolin:
    display_name: Pangolin
    env_var: PANGOLIN_API_KEY
    settings_url: https://pancakefarts.site/admin/api-keys

  miniflux:
    display_name: Miniflux
    env_var: MINIFLUX_API_KEY
    settings_url: https://mini.pancakefarts.xyz/keys

  traefik:
    display_name: Traefik
    env_var: ""
    settings_url: https://traefik.pancakefarts.site
    note: No secret key to rotate.

  gluetun_unraid:
    display_name: Gluetun (Unraid)
    env_var: GLUETUN_UNRAID_API_KEY
    settings_url: ""
    note: Edit HTTP_CONTROL_SERVER_API_KEY in the Gluetun container's env vars, then restart.

  gluetun_truenas:
    display_name: Gluetun (TrueNAS)
    env_var: GLUETUN_TRUENAS_API_KEY
    settings_url: ""
    note: Edit HTTP_CONTROL_SERVER_API_KEY in the Gluetun container's env vars, then restart.

  homebridge:
    display_name: Homebridge password
    env_var: HOMEBRIDGE_PASSWORD
    settings_url: http://192.168.1.104:8581
    note: Change under User Accounts in Homebridge settings.

  immich:
    display_name: Immich
    env_var: IMMICH_API_KEY
    settings_url: http://192.168.1.104:2283/user-settings?isOpen=api-keys

  truenas:
    display_name: TrueNAS
    env_var: TRUENAS_API_KEY
    settings_url: http://192.168.1.122/ui/apikeys
    note: Delete the old key and create a new one.

  unifi_os:
    display_name: UniFi OS
    env_var: UNIFI_OS_API_KEY
    settings_url: https://192.168.1.89:11443/proxy/network/integrations

  unifi_ucg:
    display_name: UniFi UCG
    env_var: UNIFI_UCG_API_KEY
    settings_url: https://192.168.1.1/proxy/network/integrations

  qnap:
    display_name: QNAP password
    env_var: QNAP_PASSWORD
    settings_url: https://192.168.1.168

  nut:
    display_name: NUT/Peanut password
    env_var: NUT_PASSWORD
    settings_url: ""
    note: Update in the NUT server config and in all services that reference it.
